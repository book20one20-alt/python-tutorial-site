<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Python Tutorial Hub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand-wrap">
            <a class="brand" href="{{ url_for('index') }}">PyLearn Tutorial</a>
        </div>
    </header>

    <div class="page-shell">
        <aside class="sidebar">
            <h2 class="sidebar-title">Lessons</h2>
            <nav class="lesson-nav" aria-label="Lesson navigation">
                <ul>
                    {% for item in lessons %}
                    <li>
                        <a href="{{ url_for('lesson', slug=item.slug) }}" class="sidebar-link {% if lesson and lesson.slug == item.slug %}active{% endif %}">
                            {{ item.title }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>
        </aside>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/editor.js') }}" defer></script>
</body>
</html>
